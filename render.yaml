# Render Blueprint — https://render.com/docs/blueprint-spec
# Commit this file to your repo root. Render will detect it automatically.

services:
  - type: web
    name: project-hub
    runtime: docker
    dockerfilePath: ./Dockerfile
    # Change plan to "starter" ($7/mo) for an always-on service.
    plan: free
    healthCheckPath: /up
    autoDeploy: true
    envVars:
      - key: RAILS_ENV
        value: production

      - key: RAILS_LOG_TO_STDOUT
        value: "true"

      - key: RAILS_SERVE_STATIC_FILES
        value: "true"

      # Paste the contents of config/master.key in the Render dashboard.
      # Never commit the actual value here.
      - key: RAILS_MASTER_KEY
        sync: false

      - key: SOLID_QUEUE_IN_PUMA
        value: "true"

      - key: DATABASE_URL
        fromDatabase:
          name: project-hub-db
          property: connectionString

      - key: PORT
        value: "3000"

      # Thruster (HTTP cache/compression proxy) is not needed on Render since
      # Render terminates TLS and handles compression. We bypass it and run
      # Puma directly.
      - key: THRUSTER_ENABLED
        value: "false"

databases:
  - name: project-hub-db
    databaseName: project_hub_production
    plan: free
